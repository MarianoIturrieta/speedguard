name: Build SpeedGuard APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor and Geolocation plugin
        run: npm install

      - name: Initialize Android project
        run: |
          rm -rf android
          npx cap add android
          npx cap copy android

      - name: Copy custom icons into Android project
        run: |
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            src="icons/mipmap-${density}"
            dst="android/app/src/main/res/mipmap-${density}"
            mkdir -p "$dst"
            cp "$src/ic_launcher.png"       "$dst/ic_launcher.png"
            cp "$src/ic_launcher_round.png" "$dst/ic_launcher_round.png"
          done
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          rm -f android/app/src/main/res/values/ic_launcher_background.xml

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpeedGuard-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
